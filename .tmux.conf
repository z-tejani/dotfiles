
# Set inactive window style
set -g window-style 'bg=#1e1e2e, fg=white'

# Set active window style
set -g window-active-style 'bg=#1e1e2e, fg=white'

# Color for inactive pane borders
set -g pane-border-style fg=colour244   # gray

# Color for active pane border
set -g pane-active-border-style fg=colour39  # cyan


# Status Bar
set -g status-left "#[fg=#209fb5, bold, bg=#1e1e2e] #S • "
set -g status-right "#[fg=#b4befe, bold, bg=#1e1e2e]%a • %Y-%m-%d • %l:%M %p"

set -g status-justify left
set -g status-position top
set -g status-left-length 200
set -g status-right-length 200
set -g status-style 'bg=#1e1e2e'

set -g window-status-current-format "#[fg=#dd7878, bg=#1e1e2e] *#I • #W"
set -g window-status-format "#fg=gray,bg=#1e1e2e] #I • #W"
set -g window-status-last-style "fg=white, bg=black"
